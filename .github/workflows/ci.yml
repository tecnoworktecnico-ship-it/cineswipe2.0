name: CI - CineSwipe 2.0

# https://github.com/tecnoworktecnico-ship-it/cineswipe2.0

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_SUPABASE_URL: https://dummy-url.supabase.co
  VITE_SUPABASE_ANON_KEY: dummy-anon-key-for-ci-tests

jobs:
  # Job 1: Linting - Valida la consistencia del código y reglas de equipo
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # Job 2: Testing - Ejecuta pruebas unitarias y de integración
  test:
    needs: lint # Solo corre si el lint pasa
    runs-on: ubuntu-latest
    env:
      VITE_TMDB_KEY: ${{ secrets.VITE_TMDB_KEY }} # Necesario si los tests llaman a la API o usan la key
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  # Job 3: Build - Valida la compilación y genera el bundle de producción
  build:
    needs: test # Solo corre si los tests pasan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-bundle
          path: dist/
          retention-days: 7
